<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lilyplaner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Liste der Abwesenheiten</h2>

<div class="abwesenheit-box">
    <input id="abwesenheitName" placeholder="Name">
    <input id="abwesenheitDatum" type="date">
    <input id="abwesenheitGrund" placeholder="Grund (Freitext)">
    <button onclick="addAbwesenheit()">Hinzufügen</button>
</div>

<div id="abwesenheitenListe"></div>

<hr>

<h2>4‑Wochen‑Plan</h2>

<div class="woche">
    <h3>Woche 1</h3>
    <table>
        <tr>
            <th>Name</th>
            <th>Montag</th>
            <th>Dienstag</th>
            <th>Mittwoch</th>
        </tr>

        <tr>
            <td>Frühschicht</td>
            <td><button class="add-btn" onclick="addShift(1, 'frueh')">+</button></td>
            <td><button class="add-btn" onclick="addShift(2, 'frueh')">+</button></td>
            <td><button class="add-btn" onclick="addShift(3, 'frueh')">+</button></td>
        </tr>

        <tr>
            <td>Service</td>
            <td><button class="add-btn">+</button></td>
            <td><button class="add-btn">+</button></td>
            <td><button class="add-btn">+</button></td>
        </tr>

        <tr>
            <td>Telefon</td>
            <td><button class="add-btn">+</button></td>
            <td><button class="add-btn">+</button></td>
            <td><button class="add-btn">+</button></td>
        </tr>

        <tr>
            <td>Belegung</td>
            <td><button class="add-btn">+</button></td>
            <td><button class="add-btn">+</button></td>
            <td><button class="add-btn">+</button></td>
        </tr>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
